function cancelVoiceInline() {
  voiceMode = false;
  const row = document.getElementById('voiceInlineCardRow');
  if (row) row.remove();
  // Re-enable all chips so user can try again
  document.querySelectorAll('#mainOptions .chip').forEach(c => c.classList.remove('selected', 'disabled'));
}

// Handles a command from the inline listening card or hint chips below the player.
// Goes straight to action — no redundant user bubble.
function inlineVoiceCommand(command) {
  // Dismiss the listening card if visible
  const inlineRow = document.getElementById('voiceInlineCardRow');
  if (inlineRow) inlineRow.remove();

  // Go straight to processing — no user echo bubble
  addTypingIndicator();
  setTimeout(() => {
    removeTypingIndicator();
    processVoiceCommand(command);
  }, 400);
}

function openVoiceOverlay() {
  voiceMode = true;
  const overlay = document.getElementById('voiceOverlay');
  overlay.classList.add('active');

  // Show 4 random hints
  const chips = document.getElementById('voiceHintChips');
  const shuffled = allVoiceHints.sort(() => 0.5 - Math.random()).slice(0, 4);
  chips.innerHTML = shuffled.map(h =>
    `<button class="voice-hint-chip" onclick="executeVoiceCommand('${h.replace(/'/g, "\\'")}')">"${h}"</button>`
  ).join('');

  document.getElementById('voiceStatus').textContent = 'Listening...';
  document.getElementById('voiceTranscript').textContent = '';

  // Auto-simulate a command after 3s if user doesn't tap a chip
  window._voiceAutoTimer = setTimeout(() => {
    executeVoiceCommand('Play Lag Jaa Gale');
  }, 8000);
}

function cancelVoice() {
  clearTimeout(window._voiceAutoTimer);
  document.getElementById('voiceOverlay').classList.remove('active');
  voiceMode = false;
}

function executeVoiceCommand(command) {
  clearTimeout(window._voiceAutoTimer);

  // Show transcription in overlay
  document.getElementById('voiceStatus').textContent = 'Got it!';
  document.getElementById('voiceTranscript').textContent = `"${command}"`;

  // Close overlay after brief delay
  setTimeout(() => {
    document.getElementById('voiceOverlay').classList.remove('active');

    // Add user voice bubble to chat
    const userRow = document.createElement('div');
    userRow.className = 'msg-row user';
    userRow.innerHTML = `<div class="bubble bubble-user"><svg viewBox="0 0 24 24" width="14" height="14" style="fill:white;margin-right:4px;vertical-align:-2px;"><path d="M12 15a3 3 0 003-3V5a3 3 0 00-6 0v7a3 3 0 003 3zm6-5a1 1 0 00-1 1v1a5 5 0 11-10 0v-1a1 1 0 10-2 0v1a7 7 0 1014 0v-1a1 1 0 00-1-1zm-3 10H9a1 1 0 000 2h6a1 1 0 000-2z"/></svg>${command}</div>`;
    document.getElementById('chatFlow').appendChild(userRow);
    scrollToBottom();

    // Process the command
    setTimeout(() => {
      addTypingIndicator();
      setTimeout(() => {
        removeTypingIndicator();
        processVoiceCommand(command);
      }, 800);
    }, 300);
  }, 600);
}

function addAIResponseWithChips(html, chipLabels) {
  const row = document.createElement('div');
  row.className = 'msg-row';
  const chipsHtml = chipLabels.map(c =>
    `<button class="voice-hint-chip" onclick="inlineVoiceCommand('${c.replace(/^["']|["']$/g,'').replace(/'/g,"\\'")}')"><em>${c}</em></button>`
  ).join('');
  row.innerHTML = `
    ${AVATAR_HTML}
    <div style="flex:1;min-width:0;">
      <div class="bubble bubble-ai" style="max-width:100%;">${html}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">
        ${chipsHtml}
      </div>
    </div>
  `;
  document.getElementById('chatFlow').appendChild(row);
  scrollToBottom();
}

function processVoiceCommand(command) {
  const cmdLower = command.toLowerCase();

  if (cmdLower.startsWith('play ') && !cmdLower.includes('song')) {
    const songName = command.substring(5);
    const song = voiceSongDB.find(s => s.title.toLowerCase().includes(songName.toLowerCase())) || voiceSongDB[0];
    voicePlaySong(song, `Playing <strong>${song.title}</strong> for you`);
  } else if (cmdLower.includes('next') || cmdLower.includes('skip')) {
    voiceQueueIndex = (voiceQueueIndex + 1) % voiceSongDB.length;
    const song = voiceSongDB[voiceQueueIndex];
    voicePlaySong(song, `Up next — <strong>${song.title}</strong>`);
  } else if (cmdLower.includes('previous') || cmdLower.includes('go back')) {
    voiceQueueIndex = voiceQueueIndex > 0 ? voiceQueueIndex - 1 : voiceSongDB.length - 1;
    const song = voiceSongDB[voiceQueueIndex];
    voicePlaySong(song, `Going back to <strong>${song.title}</strong>`);
  } else if (cmdLower.includes('pause') || cmdLower.includes('stop')) {
    isPlaying = false;
    const pb = document.getElementById('vnpPlayBtn');
    if (pb) pb.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
    addAIResponseWithChips('Paused. Ready when you are.', ['"Resume"', '"Next song"', '"Something romantic"']);
  } else if (cmdLower.includes('resume') || (cmdLower === 'play')) {
    isPlaying = true;
    const pb = document.getElementById('vnpPlayBtn');
    if (pb) pb.innerHTML = '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
    addAIResponseWithChips('Resuming!', ['"Next song"', '"Something romantic"', '"Pause"']);
  } else if (cmdLower.includes('romantic') || cmdLower.includes('something romantic')) {
    const song = voiceSongDB[0]; // Lag Jaa Gale
    voicePlaySong(song, 'Setting the mood — something beautiful and timeless for you');
  } else if (cmdLower.includes('peppy') || cmdLower.includes('upbeat') || cmdLower.includes('something peppy')) {
    const song = voiceSongDB[5]; // Pehla Nasha
    voicePlaySong(song, 'Turning up the energy! Here\'s something feel-good');
  } else if (cmdLower.includes('monsoon') || cmdLower.includes('rainy')) {
    const song = voiceSongDB[1]; // Rimjhim Gire Sawan
    voicePlaySong(song, 'Perfect for the rain — here\'s a monsoon classic');
  } else if (cmdLower.includes('kishore kumar') || cmdLower.includes('by kishore') || cmdLower.includes('play kishore')) {
    const song = voiceSongDB[1]; // Rimjhim Gire Sawan
    voicePlaySong(song, 'A Kishore Kumar legend, coming right up');
  } else if (cmdLower.includes('90s') || cmdLower.includes('nostalgia')) {
    const song = voiceSongDB[5]; // Pehla Nasha
    voicePlaySong(song, 'Taking you back to the golden 90s...');
  } else if (cmdLower.includes('heartbreak') || cmdLower.includes('sad')) {
    const song = voiceSongDB[4]; // Channa Mereya
    voicePlaySong(song, 'Some songs understand us better than words can. Here\'s one.');
  } else if (cmdLower.includes('lata') || cmdLower.includes('mangeshkar')) {
    const song = voiceSongDB[0]; // Lag Jaa Gale
    voicePlaySong(song, 'The queen of melody — nobody does it like Lata ji');
  } else if (cmdLower.includes('arijit')) {
    const song = voiceSongDB[2]; // Tum Hi Ho
    voicePlaySong(song, 'Arijit Singh — the voice of a generation');
  } else if (cmdLower.includes('dedicate') || cmdLower.includes('dedication')) {
    addAIResponseWithChips('Aww, who\'s this dedication for?', ['"For someone special"', '"For my best friend"', '"For my mom"']);
  } else if (cmdLower.includes('trivia') || cmdLower.includes('tell me about') || cmdLower.includes('fun fact')) {
    const cur = voiceSongDB[voiceQueueIndex];
    if (cur && cur.trivia) {
      addAIResponseWithChips(`<strong>Did you know?</strong><br><br>${cur.trivia}`, ['"Next song"', '"Dedicate this song"', '"Something romantic"']);
    }
  } else if (cmdLower.includes('surprise') || cmdLower.includes('you pick') || cmdLower.includes('you choose') || cmdLower.includes('anything')) {
    const song = voiceSongDB[Math.floor(Math.random() * voiceSongDB.length)];
    voicePlaySong(song, `I think you\'ll love this one — <strong>${song.title}</strong>`);
  } else {
    const song = voiceSongDB[0];
    voicePlaySong(song, `Playing <strong>${song.title}</strong> for you`);
  }
}

function voicePlaySong(song, aiMessage) {
  voiceQueueIndex = voiceSongDB.indexOf(song);
  if (voiceQueueIndex === -1) voiceQueueIndex = 0;
  isPlaying = true;
  playSongAudio(song);
  window._currentTracks = voiceSongDB;
  window._currentTrackIndex = voiceQueueIndex;

  // Remove old now-playing row if exists (song changed)
  const oldRow = document.getElementById('voiceNowPlayingRow');
  if (oldRow) oldRow.remove();

  // Remove old hint row if exists
  const oldHint = document.getElementById('voiceCommandHintRow');
  if (oldHint) oldHint.remove();

  renderVoiceNowPlaying(song, aiMessage || null, song.chips || ['Next song', 'Pause', 'Something romantic']);
}

function toggleVoicePanel(panel) {
  const main = document.getElementById('vnpMain');
  const lyrics = document.getElementById('vnpLyricsPanel');
  const queue = document.getElementById('vnpQueuePanel');
  if (!main) return;
  main.style.display = panel === 'main' ? 'block' : 'none';
  lyrics.style.display = panel === 'lyrics' ? 'block' : 'none';
  queue.style.display = panel === 'queue' ? 'block' : 'none';
}

function toggleVoicePlay() {
  isPlaying = !isPlaying;
  isPlaying ? resumeSongAudio() : pauseSongAudio();
  const btn = document.getElementById('vnpPlayBtn');
  if (!btn) return;
  btn.innerHTML = isPlaying
    ? '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>'
    : '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
}

function addAIResponse(html) {
  const aiRow = document.createElement('div');
  aiRow.className = 'msg-row';
  aiRow.innerHTML = `
    ${AVATAR_HTML}
    <div>
      <div class="bubble bubble-ai">${html}</div>
      ${FEEDBACK_HTML}
    </div>
  `;
  document.getElementById('chatFlow').appendChild(aiRow);
  scrollToBottom();
}

function voiceSkip(dir) {
  voiceQueueIndex = (voiceQueueIndex + dir + voiceSongDB.length) % voiceSongDB.length;
  const song = voiceSongDB[voiceQueueIndex];
  isPlaying = true;
  playSongAudio(song);
  window._currentTrackIndex = voiceQueueIndex;

  // Update vnp-card if present
  const cover = document.getElementById('vnpCoverImg');
  if (cover) {
    cover.src = song.img;
    document.getElementById('vnpTitle').textContent = song.title;
    document.getElementById('vnpArtist').textContent = `${song.artist} · ${song.film}`;
    document.getElementById('vnpTimeDuration').textContent = song.dur;
    document.getElementById('vnpTimeCurrent').textContent = '0:00';
    document.getElementById('vnpProgressFill').style.width = '0%';
    document.getElementById('vnpPlayBtn').innerHTML = '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
    // Update lyrics panel header
    const la = document.getElementById('vnpLyricsArt');
    if (la) la.src = song.img;
    const lt = document.getElementById('vnpLyricsTitle');
    if (lt) lt.textContent = song.title;
    const lar = document.getElementById('vnpLyricsArtist');
    if (lar) lar.textContent = song.artist;
    // Refresh lyrics text
    const lyrics = song.lyrics || sampleLyrics;
    const lyricsHtml = lyrics.map((line, i) =>
      line ? `<div class="vnp-lyrics-line${i === 2 ? ' active' : ''}">${line}</div>` : '<div style="height:10px;"></div>'
    ).join('');
    const lt2 = document.getElementById('vnpLyricsText');
    if (lt2) lt2.innerHTML = lyricsHtml;
    // Refresh queue list
    const idx = voiceQueueIndex;
    const queueHtml = voiceSongDB.map((s, i) => `
      <div class="vnp-queue-item${i === idx ? ' playing' : ''}" onclick="voicePlaySong(voiceSongDB[${i}])">
        <div class="vnp-qi-num">${i === idx ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" style="fill:var(--sparkle)"><path d="M8 5v14l11-7z"/></svg>' : (i + 1)}</div>
        <img class="vnp-qi-art" src="${s.img}" alt="">
        <div class="vnp-qi-info">
          <div class="vnp-qi-title">${s.title}</div>
          <div class="vnp-qi-artist">${s.artist}</div>
        </div>
        <div class="vnp-qi-dur">${s.dur}</div>
      </div>
    `).join('');
    const ql = document.getElementById('vnpQueueList');
    if (ql) ql.innerHTML = queueHtml;
    // Refresh contextual chips
    const cw = document.getElementById('vnpChipsWrap');
    if (cw) {
      const songChips = song.chips || ['Next song', 'Pause', 'Something romantic'];
      cw.innerHTML = songChips.map(c =>
        `<button class="voice-hint-chip" onclick="inlineVoiceCommand('${c.replace(/'/g, "\\'")}')">${c}</button>`
      ).join('');
    }
  }
}

function addMsg(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  while (tmp.firstChild) {
    document.getElementById('chatFlow').appendChild(tmp.firstChild);
  }
  scrollToBottom();
}

function fmtTime(secs) {
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

// ═══════════════════════════════════
// AI PERSONAL RJ -- Select persona
// ═══════════════════════════════════
function showRJSelect() {
  addMsg(`<div class="thinking-row">${MINI_AVATAR_HTML}<span class="thinking-text">Setting up your RJ...</span></div>`);

  setTimeout(() => {
    document.querySelectorAll('.thinking-row').forEach(e => e.remove());

    const cards = personas.map(p => {
      let iconSvg = IC.bolt;
      if (p.id === 'calm') iconSvg = IC.moon;
      if (p.id === 'witty') iconSvg = IC.brain;
      return `<div class="persona-card" onclick="startRJ('${p.id}')">
        <div class="persona-icon" style="background:${p.bgLight};color:${p.color}"><div style="width:22px;height:22px;fill:${p.color}">${iconSvg.replace('viewBox', `style="fill:${p.color}" viewBox`)}</div></div>
        <div class="persona-info">
          <div class="persona-name">${p.name}</div>
          <div class="persona-desc">${p.desc}</div>
        </div>
        <div class="persona-arrow">${IC.chevronR}</div>
      </div>`;
    }).join('');

    addMsg(`<div class="ai-msg">${AVATAR_HTML}<div class="ai-content">
      <div class="ai-text"><p>Choose a personality for your personal radio station. The RJ will curate music, share trivia between songs, and respond to your voice requests.</p></div>
      <div class="gap-8 mt-8">${cards}</div>
      <div class="tradeoff-box mt-12">
        <div class="tradeoff-label">How it works</div>
        <div class="tradeoff-item">Speaks between songs only \u2014 companion, not radio</div>
        <div class="tradeoff-item">No thumbs-up/rating \u2014 learns from your behaviour</div>
        <div class="tradeoff-item">No playlists to manage \u2014 the RJ IS the playlist</div>
        <div class="tradeoff-item">No push notifications \u2014 voluntary return only</div>
      </div>
      ${FEEDBACK_HTML}
    </div></div>`);
  }, 1200);
}

// ═══════════════════════════════════
// AI PERSONAL RJ -- Now Playing
// ═══════════════════════════════════
function startRJ(personaId) {
  selectedPersona = personas.find(p => p.id === personaId);
  currentSong = 0;
  songProgress = 0;
  sessionTime = 0;
  isPlaying = true;
  interludeShown = false;

  addMsg(`<div class="user-msg"><div class="user-bubble">Play with RJ ${selectedPersona.name}</div></div>`);

  setTimeout(() => {
    addMsg(`<div class="thinking-row">${MINI_AVATAR_HTML}<span class="thinking-text">RJ ${selectedPersona.name} is getting ready...</span></div>`);
  }, 300);

  setTimeout(() => {
    document.querySelectorAll('.thinking-row').forEach(e => e.remove());
    renderNowPlaying();
    startSongProgress();
  }, 1500);
}

      <button class="qc-chip" onclick="rjCommand('Iska cover version?')">Iska cover version?</button>
    </div>

    ${FEEDBACK_HTML}
  </div></div>`);
}

function startSongProgress() {
  if (songInterval) clearInterval(songInterval);
  songInterval = setInterval(() => {
    if (!isPlaying) return;
    songProgress += 5;
    sessionTime++;
    const bar = document.getElementById('npBar');
    const curTime = document.getElementById('npTimeCur');
    const timer = document.getElementById('sessionTimer');
    if (bar) bar.style.width = Math.min(songProgress, 100) + '%';
    if (curTime) curTime.textContent = fmtTime(songProgress * 2.7);
    if (timer) timer.textContent = fmtTime(Math.floor(sessionTime / 10));

    if (songProgress >= 100) {
      clearInterval(songInterval);
      songInterval = null;
      isPlaying = false;
      songProgress = 100;

      const npCard = document.querySelector('.now-playing');
      if (npCard) {
        npCard.classList.add('np-complete');
        setTimeout(() => npCard.classList.remove('np-complete'), 600);
      }

      if (!interludeShown) {
        interludeShown = true;
        setTimeout(() => showInterlude(), 700);
      } else {
        setTimeout(() => {
          currentSong = (currentSong + 1) % rjPlaylist.length;
          songProgress = 0;
          isPlaying = true;
          updateSongDisplay();
        }, 800);
      }
    }
  }, 100);
}

function togglePlay() {
  isPlaying = !isPlaying;
  const btn = document.getElementById('playPauseBtn');
  const pulse = document.getElementById('npPulse');
  if (btn) btn.innerHTML = isPlaying ? IC.pause : IC.play;
  if (pulse) pulse.style.animationPlayState = isPlaying ? 'running' : 'paused';
  if (isPlaying && !songInterval) startSongProgress();
}

function nextSong() {
  currentSong = (currentSong + 1) % rjPlaylist.length;
  songProgress = 0;
  updateSongDisplay();
}

function prevSong() {
  currentSong = Math.max(0, currentSong - 1);
  songProgress = 0;
  updateSongDisplay();
}

function updateSongDisplay() {
  const song = rjPlaylist[currentSong];
  const el = (id) => document.getElementById(id);
  if (el('npTitle')) el('npTitle').textContent = song.title;
  if (el('npArtist')) el('npArtist').textContent = `${song.artist} \u2022 ${song.album}`;
  if (el('npTimeDur')) el('npTimeDur').textContent = song.duration;
  if (el('npBar')) el('npBar').style.width = '0%';
  if (el('npTimeCur')) el('npTimeCur').textContent = '0:00';
  isPlaying = true;
  const btn = document.getElementById('playPauseBtn');
  if (btn) btn.innerHTML = IC.pause;
  startSongProgress();
}

function showInterlude() {
  const il = interludes[currentSong % interludes.length];
  const bars = Array.from({length: 16}, () => `<div class="il-bar" style="background:${selectedPersona.color}"></div>`).join('');

  addMsg(`<div class="ai-msg">${AVATAR_HTML}<div class="ai-content">
    <div class="interlude-card" id="rjInterludeCard">
      <div class="interlude-header">
        <div class="il-dot" style="background:${selectedPersona.color}"></div>
        <span class="il-label">RJ ${selectedPersona.name} says:</span>
      </div>
      <div class="il-waveform" id="rjWaveform">
        ${bars}
      </div>
    </div>
  </div></div>`);

  // Play the audio
  if (il.audio) {
    if (window._rjAudio) { window._rjAudio.pause(); window._rjAudio = null; }
    const audio = new Audio(il.audio);
    window._rjAudio = audio;
    audio.play().catch(() => {});
    audio.onended = () => {
      // Stop waveform animation when audio ends
      const wf = document.getElementById('rjWaveform');
      if (wf) wf.classList.add('paused');
      // Auto-advance to next song after brief pause
      setTimeout(() => dismissInterlude(), 1500);
    };
  } else {
    // No audio — auto-dismiss after 5s
    setTimeout(() => dismissInterlude(), 5000);
  }
}

function dismissInterlude() {
  currentSong = (currentSong + 1) % rjPlaylist.length;
  songProgress = 0;
  isPlaying = true;
  if (songInterval) { clearInterval(songInterval); songInterval = null; }
  updateSongDisplay();
}

function renderPodcastList(lang, journey) {
  lang = lang || 'All';
  journey = journey || 'All';
  let filtered = podcastsData.slice();
  if (lang !== 'All') filtered = filtered.filter(p => p.lang === lang);
  if (journey !== 'All') filtered = filtered.filter(p => p.topic.toLowerCase().includes(journey.toLowerCase()));
  const maxLen = podcastPrefs.length || 45;
  filtered = filtered.filter(p => {
    const dur = parseInt(p.duration) || 0;
    return dur <= maxLen;
  });

  const langBtns = ['All', 'Tamil', 'Hindi', 'Telugu', 'English'].map(l =>
    `<button class="lang-btn${l === lang ? ' active' : ''}" onclick="filterPodcasts('${l}')">${l}</button>`
  ).join('');

  const prefTags = `<div class="pref-summary">
    <span class="pref-tag">${IC.clock} ${podcastPrefs.length} min</span>

  if (!filtered.length) {
    const prevEmpty = document.getElementById('podcastListBlock');

    addMsg(`<div class="ai-msg" id="podcastListBlock">${AVATAR_HTML}<div class="ai-content">

    return;

    const iconHTML = IC[p.icon] ? IC[p.icon].replace('viewBox', `style="fill:${p.color};width:22px;height:22px" viewBox`) : IC.headphones;
    return `<div class="podcast-card" onclick="openPodcast(${p.id})">
      <div class="podcast-icon" style="background:${p.bgLight}">${iconHTML}</div>
      <div class="podcast-info">

        <div class="podcast-meta">${p.lang} \u2022 ${p.topic} \u2022 ${p.duration} \u2022 ${p.episodes} episodes</div>

      <div class="podcast-arrow">${IC.chevronR}</div>
    </div>`;
  }).join('');

  const prev = document.getElementById('podcastListBlock');
  if (prev) prev.remove();

  addMsg(`<div class="ai-msg" id="podcastListBlock">${AVATAR_HTML}<div class="ai-content">
    <div class="ai-text"><p><strong>JioBharatIQ Originals</strong></p><p>Daily fresh episodes curated for you</p></div>

      <div class="tradeoff-label">About Originals</div>

}

  health: {
    q: ["What's the diet tip for today?", "Is this medically reviewed?", "Give me a simple action step"],
    a: [
      "Today's focus: replacing white rice with foxtail millet (thinai) for 2 meals a week can reduce post-meal blood sugar spikes by up to 28% in Type 2 patients. Start with khichdi — it's the easiest swap.",
      "Yes — all Sehat ki Baat content is reviewed by a registered dietitian before publishing. We follow ICMR guidelines. This is educational, not a prescription.",
      "Action step: Tonight, swap your evening rice with 50g of jowar rotis. That's it. One meal. Note how you feel at 9 PM. Most people report less drowsiness within 2 weeks of this switch."
    ]
  },
  default: {
    q: ["What's the main takeaway?", "Who hosts this?", "Can I get a summary?"],
    a: [
      "The main insight from today's episode is about consistency over intensity — showing up daily for 10 minutes beats a 2-hour session once a week. The compound effect is real.",
      "This JioBharatIQ Original is hosted by domain experts curated for Bharat's unique context — not recycled international content. Hindi and regional languages first.",
      "Here's your 30-second summary: 1 core idea, 2 practical tips, 1 question to reflect on. Tune in tomorrow for the next episode — same time, 5 AM."
    ]
  }
};

function podcastAskQuestion() {
  if (!selectedPodcast) return;
  const topic = selectedPodcast.topic.toLowerCase();
  const bank = podcastQABank[topic] || podcastQABank.default;
  const chips = bank.q.map((q, i) =>
    `<button class="voice-hint-chip" onclick="submitPodcastQuestion(${i})" style="font-size:12px;">"${q}"</button>`
  ).join('');

  const row = document.createElement('div');
  row.className = 'msg-row';
  row.id = 'podcastQARow';
  row.innerHTML = `
    ${AVATAR_HTML}
    <div style="flex:1;">
      <div class="voice-inline-card">
        <div class="vic-mic-wrap">
          <div class="vic-mic-ring" style="border-color:${selectedPodcast.color}">
            <button class="vic-mic-btn" style="background:${selectedPodcast.color}">
              <svg viewBox="0 0 24 24" width="28" height="28"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z" fill="white"/></svg>
            </button>
          </div>
          <div class="vic-status">Ask the host</div>
          <div class="vic-sub">Tap a question or type your own</div>
        </div>
        <div class="vic-hint-label">Suggested questions</div>
        <div class="vic-hints-wrap">${chips}</div>
        <button class="vic-cancel-btn" onclick="document.getElementById('podcastQARow').remove()">Cancel</button>
      </div>
    </div>
  `;
  document.getElementById('chatFlow').appendChild(row);
  scrollToBottom();
}

function submitPodcastQuestion(idx) {
  const qaRow = document.getElementById('podcastQARow');
  if (qaRow) qaRow.remove();

  const topic = (selectedPodcast && selectedPodcast.topic.toLowerCase()) || 'default';
  const bank = podcastQABank[topic] || podcastQABank.default;
  const question = bank.q[idx] || bank.q[0];
  const answer = bank.a[idx] || bank.a[0];

  // User bubble
  const userRow = document.createElement('div');
  userRow.className = 'msg-row user';
  userRow.innerHTML = `<div class="bubble bubble-user" style="display:flex;align-items:center;gap:6px;">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" style="opacity:0.75;flex-shrink:0"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
    <span>${question}</span>
  </div>`;
  document.getElementById('chatFlow').appendChild(userRow);
  scrollToBottom();

  addTypingIndicator();
  setTimeout(() => {
    removeTypingIndicator();
    addMsg(`<div class="ai-msg">${AVATAR_HTML}<div class="ai-content">
      <div class="ai-text"><p>${answer}</p></div>
      <div class="quick-cmds mt-8">
        <button class="qc-chip" onclick="podcastAskQuestion()">Ask another question</button>
        <button class="qc-chip" onclick="podcastMoreLikeThis()">More like this</button>
        <button class="qc-chip" onclick="backToPodcastList()">Back to list</button>
      </div>
      ${FEEDBACK_HTML}
    </div></div>`);
  }, 900);
}

function podcastSaveEpisode() {
  addMsg(`<div class="user-msg"><div class="user-bubble">Save episode</div></div>`);
  setTimeout(() => {
    addMsg(`<div class="ai-msg">${AVATAR_HTML}<div class="ai-content">
      <div class="ai-text"><p>Saved to your library! You can listen offline anytime. I'll also remind you of the next episode tomorrow at 5 AM.</p></div>
      <div class="quick-cmds mt-8">
        <button class="qc-chip" onclick="podcastAskQuestion()">Ask about this episode</button>
        <button class="qc-chip" onclick="podcastMoreLikeThis()">More like this</button>
        <button class="qc-chip" onclick="backToPodcastList()">Explore all podcasts</button>
      </div>
      ${FEEDBACK_HTML}
    </div></div>`);
  }, 700);
}

function podcastMoreLikeThis() {
  if (!selectedPodcast) return;
  addMsg(`<div class="user-msg"><div class="user-bubble">More like this</div></div>`);
  setTimeout(() => {
    const similar = podcastsData.filter(p => p.id !== selectedPodcast.id && (p.topic === selectedPodcast.topic || p.lang === selectedPodcast.lang)).slice(0, 3);
    const cards = similar.map(p => {
      const iconHTML = IC[p.icon] ? IC[p.icon].replace('viewBox', `style="fill:${p.color};width:22px;height:22px" viewBox`) : IC.headphones;
      return `<div class="podcast-card" onclick="openPodcast(${p.id})">
        <div class="podcast-icon" style="background:${p.bgLight}">${iconHTML}</div>
        <div class="podcast-info">
          <div class="podcast-title">${p.title}</div>
          <div class="podcast-meta">${p.lang} \u2022 ${p.topic} \u2022 ${p.duration}</div>
        </div>
        <div class="podcast-arrow">${IC.chevronR}</div>
      </div>`;
    }).join('');
    addMsg(`<div class="ai-msg">${AVATAR_HTML}<div class="ai-content">
      <div class="ai-text"><p>Based on <strong>${selectedPodcast.title}</strong>, here are similar shows you'd like:</p></div>
      <div class="gap-8 mt-8">${cards || '<p style="color:var(--grey-60);font-size:13px;">No similar podcasts found — try exploring all categories.</p>'}</div>
      ${FEEDBACK_HTML}
    </div></div>`);
  }, 800);
}

function backToPodcastList() {
  if (podcastInterval) clearInterval(podcastInterval);
  podcastPlaying = false;
  renderPodcastList('All');
}

// ── Init ──
// No renderPrompts on init — prompts show only after user picks "Tell me in your own words"
</script>
</body>
</html>
